# --------------------------------------------------------------
# Batch manifest
# Each entry under "jobs" is one analysis run.
# Copy this file, edit the values, then run:
#
#   analyzer-batch manifest.yaml
#   analyzer-batch manifest.yaml --dry-run
#   analyzer-batch manifest.yaml --jobs copper_offset,gold_offset
#
# All paths are relative to the manifest file's directory unless
# they are absolute.
#
# Every job must have:
#   name  - unique label (used for logging and --jobs filter)
#   tool  - one of the CLI entry points (run-fit, assess-partial,
#           assess-result, theta-offset, eis-intervals, etc.)
#   args  - list of positional and --flag arguments, exactly as you
#           would type them on the command line
#
# The optional top-level "defaults" section supplies fallback
# key/values that are merged into every job (jobs can override).
# --------------------------------------------------------------

# -- Shared defaults (applied to every job unless overridden) --
defaults:
  output_root: ./output       # each job writes to <output_root>/<job name>

# -- Jobs ------------------------------------------------------
jobs:
  # -- Theta-offset calculations -------------------------------
  - name: copper_offset
    tool: theta-offset
    args:
      - /SNS/REF_L/IPTS-33699/nexus/REF_L_226642.nxs.h5
      - --db
      - /SNS/REF_L/shared/autoreduce/DB_226559.dat
      - --log
      - offsets.csv

  - name: gold_offset
    tool: theta-offset
    args:
      - /SNS/REF_L/IPTS-33699/nexus/REF_L_226700.nxs.h5
      - --db
      - /SNS/REF_L/shared/autoreduce/DB_226559.dat
      - --ymin
      - "135"
      - --ymax
      - "170"
      - --log
      - offsets.csv

  # -- Partial data quality checks -----------------------------
  - name: check_218281
    tool: assess-partial
    args:
      - "218281"

  - name: check_218386
    tool: assess-partial
    args:
      - "218386"

  # -- Fit + assess workflow -----------------------------------
  # `run-fit` takes a refl1d-ready Python script as its single
  # positional argument (typically produced by `create-model`).
  # `--name` controls the output subfolder under <results-dir>/<name>
  # and the report tag; defaults to the script stem when omitted.
  - name: fit_copper
    tool: run-fit
    args:
      - models/cu_thf_218281.py
      - --name
      - cu_thf_218281

  # `assess-result` takes the fit-output directory as its single
  # positional argument. The directory's basename becomes the report
  # tag, so an explicit name is not needed here.
  - name: assess_copper
    tool: assess-result
    args:
      - results/cu_thf_218281

  # -- End-to-end pipeline for a single sample -----------------
  # `analyze-sample` takes a YAML config (same shape as
  # `create-model --config`) and runs partial-checks → reduction
  # gate → create-model → run-fit → assess-result.
  - name: pipeline_218281
    tool: analyze-sample
    args:
      - samples/cu_thf_218281.yaml

  # -- Bulk-process many files with the same options -----------
  # `files:` is a shorthand that expands to one job per filename,
  # each with `--event-file <file>` appended to args.  The optional
  # `name:` becomes a prefix; otherwise the tool name is used.
  - tool: simple-reduction
    args:
      - --template
      - template_down.xml
    files:
      - REF_L_226642.nxs.h5
      - REF_L_226643.nxs.h5
      - REF_L_226644.nxs.h5

  # General form: `for_each` works with any single flag.
  # Here we run the same fit script with several different output
  # subfolder names by replicating the job once per `--name` value.
  - name: fit_all
    tool: run-fit
    args:
      - models/cu_thf.py
    for_each:
      --name:
        - cu_thf_218281
        - cu_thf_218386
